# ==========================================
# 测试专用 Workflow
# 独立运行测试，快速反馈
# ==========================================

name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  # 允许手动触发
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  APP_DIR: app

jobs:
  # ----------------------------------------
  # 单元测试
  # ----------------------------------------
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ env.APP_DIR }}
        run: npm ci

      - name: Run unit tests
        working-directory: ./${{ env.APP_DIR }}
        run: npm run test:run -- --coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.APP_DIR }}/coverage
          retention-days: 30

  # ----------------------------------------
  # E2E 测试 (可选，需要配置)
  # ----------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install dependencies
        working-directory: ./${{ env.APP_DIR }}
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Run E2E tests
        working-directory: ./${{ env.APP_DIR }}
        run: npm run test:e2e || echo "E2E tests not configured yet"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: ${{ env.APP_DIR }}/playwright-report
          retention-days: 30

  # ----------------------------------------
  # 测试报告汇总
  # ----------------------------------------
  test-report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests]
    if: always()
    
    steps:
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: coverage
      
      - name: Create test summary
        run: |
          echo "## 🧪 测试报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 单元测试" >> $GITHUB_STEP_SUMMARY
          echo "- 状态：${{ needs.unit-tests.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 覆盖率报告" >> $GITHUB_STEP_SUMMARY
          echo "查看 artifacts 下载完整报告" >> $GITHUB_STEP_SUMMARY
