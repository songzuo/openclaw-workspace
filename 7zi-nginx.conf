# HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name 7zi.com www.7zi.com;

    # Gmail Pub/Sub 回调端点 (HTTP)
    location /gmail-pubsub {
        proxy_pass http://127.0.0.1:8318/gmail-pubsub;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查端点 (HTTP)
    location /health {
        proxy_pass http://127.0.0.1:8318/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 其他请求重定向到 HTTPS
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name 7zi.com www.7zi.com;

    # SSL 证书配置
    ssl_certificate /web/ssl_unified/7zi.com.crt;
    ssl_certificate_key /web/ssl_unified/7zi.com.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5:ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # 安全头
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 网站根目录
    root /var/www/7zi;
    index index.html;

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Next.js 静态文件
    location /_next/static {
        alias /var/www/7zi/_next/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gmail Pub/Sub 回调端点 (HTTPS)
    location /gmail-pubsub {
        proxy_pass http://127.0.0.1:8318/gmail-pubsub;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 健康检查端点 (HTTPS)
    location /health {
        proxy_pass http://127.0.0.1:8318/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 主应用路由
    location / {
        try_files $uri $uri/ /404.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # 日志
    access_log /var/log/nginx/7zi.com-https.access.log;
    error_log /var/log/nginx/7zi.com-https.error.log;
}
